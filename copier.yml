project_name:
  type: str
  help: The name of the project
  default: My Project
project_description:
  type: str
  help: The short description of the project
  default: "TODO: write something meaningful here."
  validator: >-
    {% if project_description | trim == "" %}
    Please provide a short project description.
    {% endif %}
repository_provider:
  type: str
  help: The git platform used to host the repository
  choices:
    - github
    - gitlab
  default: github
author_name:
  type: str
  help: The name of the author
  default: FirstName LastName
author_email:
  type: str
  help: The contact email of the maintainers
  default: email@example.com
maintainer:
  type: str
  help: The name of the current maintainer
  default: ""
  when: "{{ repository_provider == 'github' }}"
distribution_name:
  type: str
  help: Your Python package distribution name (for `pip install NAME`)
  default: "{{ project_name.lower().replace('_', '-').replace(' ', '-') }}"
package_name:
  type: str
  help: The name of the Python package
  default: "{{ distribution_name.lower().replace('-', '_').replace(' ', '_') }}"
  validator: >-
    {% if not (package_name | regex_search('^[a-zA-Z][_a-zA-Z0-9]*$')) %}
    {{ package_name }} is not a valid Python package name.
    {% endif %}
version:
  type: str
  help: The default first version
  default: 0.1.0.dev0
repository_namespace:
  type: str
  help: The repository namespace (user name or organization)
  default: your-organization-or-user
  placeholder: your-organization-or-user
repository_name:
  type: str
  help: The repository name
  default: "{{ distribution_name }}"
  placeholder: "{{ distribution_name }}"
  validator: >-
    {% if not (repository_name | regex_search('^[a-zA-Z][a-zA-Z_\\.\\-0-9]+$')) %}
    {{ repository_name }} is not a valid repository name.
    {% endif %}
repository_host:
  type: str
  help: The hostname of the repository server
  default: "{%- if repository_provider == 'github' -%}github.com{%- elif repository_provider == 'gitlab' -%}gitlab.com{% endif %}"
  placeholder: "{%- if repository_provider == 'github' -%}github.com{%- elif repository_provider == 'gitlab' -%}gitlab.com{% endif %}"
download_url:
  type: str
  help: The repository URL
  default: "https://{{ repository_host }}/{{ repository_namespace }}/{{ repository_name }}"
  placeholder: "https://{{ repository_host }}/{{ repository_namespace }}/{{ repository_name }}"
tracker_url:
  type: str
  help: The tracker URL
  default: "{%- if repository_provider == 'gitlab' -%}https://{{ repository_host }}/{{ repository_namespace }}/{{ repository_name }}/-/issues{%- else -%}https://{{ repository_host }}/{{ repository_namespace }}/{{ repository_name }}/issues{% endif %}"
  placeholder: "{%- if repository_provider == 'gitlab' -%}https://{{ repository_host }}/{{ repository_namespace }}/{{ repository_name }}/-/issues{%- else -%}https://{{ repository_host }}/{{ repository_namespace }}/{{ repository_name }}/issues{% endif %}"
docs_url:
  type: str
  help: The project documentation URL (e.g. ReadTheDocs, GitHub Pages)
  default: "{{ download_url }}"
  placeholder: "{{ download_url }}"
docs_type:
  type: str
  help: The documentation mode to generate
  choices:
    - sphinx
    - README
  default: sphinx
type_checker:
  type: str
  help: The static type checker to configure for the project
  choices:
    - pyright
    - pyrefly
  default: pyright
strict_typing:
  type: bool
  help: Should Pyright be configured in strict mode?
  default: true
  when: "{{ type_checker == 'pyright' }}"
use_uv_lock:
  type: bool
  help: Should generated automation commit and enforce uv.lock?
  choices:
    "yes": true
    "no": false
  default: "no"
setup_renovate:
  type: bool
  help: Should Renovate configuration be generated for GitHub?
  choices:
    "yes": true
    "no": false
  default: "no"
  when: "{{ repository_provider == 'github' }}"
setup_github_pages_docs:
  type: bool
  help: Should GitHub Pages documentation deployment be generated?
  choices:
    "yes": true
    "no": false
  default: "no"
  when: "{{ repository_provider == 'github' and sphinx }}"
setup_container:
  type: bool
  help: Should GitHub container build and publish automation be generated?
  choices:
    "yes": true
    "no": false
  default: "no"
  when: "{{ repository_provider == 'github' }}"
docker_debug:
  type: bool
  help: Should a debug Docker image target be generated (with debugpy for remote debugging)?
  choices:
    "yes": true
    "no": false
  default: "no"
  when: "{{ setup_container }}"
pypi:
  type: bool
  help: |
    Publish to PyPI on tagged releases via OIDC trusted publishing?
    (No API token needed — configure a trusted publisher on pypi.org after project creation,
    using environment name "release".)
  choices:
    "yes": true
    "no": false
  default: "yes"
  when: "{{ repository_provider == 'github' }}"
sphinx:
  type: bool
  default: "{{ docs_type == 'sphinx' }}"
  when: false
copyright_holder:
  type: str
  help: The copyright holder name used in the license file
  default: "{{ author_name }}"
copyright_year:
  type: str
  help: The year when the repository was created
  default: "{% now 'utc', '%Y' %}"
copyright_license:
  type: str
  help: Your project's license
  default: "MIT License"
  choices:
    Apache License 2.0: null
    Internal / Proprietary License: internal-proprietary
    BSD 3-Clause "New" or "Revised" License: null
    GNU Affero General Public License v3.0: null
    GNU General Public License v3.0: null
    GNU Lesser General Public License v3.0: null
    MIT License: null
    Mozilla Public License 2.0: null
setup_codeql:
  type: bool
  help: Should the project setup CodeQL workflow in CI?
  choices:
    "yes": true
    "no": false
  default: "no"
  when: "{{ repository_provider == 'github' }}"
init_git:
  type: bool
  help: Should git be initialized?
  choices:
    "yes": true
    "no": false
  default: "yes"
ssh_url:
  type: str
  help: The SSH URL to set as the git remote
  default: "git@{{ repository_host }}:{{ repository_namespace }}/{{ repository_name }}.git"
  placeholder: "git@{{ repository_host }}:{{ repository_namespace }}/{{ repository_name }}.git"
  when: "{{ init_git is true }}"

_subdirectory:
  template
_jinja_extensions:
  - copier_templates_extensions.TemplateExtensionLoader
  - extensions/context.py:ContextUpdater
  - jinja2_time.TimeExtension
_exclude:
  - "*.py[co]"
  - ".DS_Store"
  - ".git"
  - ".svn"
  - ".tox"
  - "__pycache__"
  - "copier.yaml"
  - "copier.yml"
  - "~*"
_tasks:
    - "{%- if use_uv_lock -%}SETUPTOOLS_SCM_PRETEND_VERSION_FOR_{{ distribution_name | upper | replace('-', '_') }}={{ version }} uv lock{% endif %}"
    - "{%- if init_git -%}git init; git add --all; git remote add origin {{ ssh_url }}{% else %}{% endif %}"
