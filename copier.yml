project_name:
  type: str
  help: The name of the project
  default: My-Project
project_description:
  type: str
  help: The short description of the project
  default: "TODO: write something meaningful here"
author_name:
  type: str
  help: The name of the author
  default: bbp-ou-cells
author_email:
  type: str
  help: The contact email of the maintainers
  default: bbp-ou-cells@groupes.epfl.ch
maintainer:
  type: str
  help: The name of the current maintainer
team_name:
  type: str
  help: The name of the team
  default: neuromath
package_name:
  type: str
  help: The name of the Python package
  default: "{{ project_name.lower().replace('-', '_').replace(' ', '_') }}"
repository_provider:
  type: str
  help: The destination platform used to store the repository
  choices:
    - gitlab
    - github
  default: gitlab
version:
  type: str
  help: The default first version
  default: 0.1.0.dev0
repository:
  type: str
  help: The repository name (with optional organization)
  default: "{%- if repository_provider == 'github' -%}BlueBrain/{{ project_name }}{%- elif repository_provider == 'gitlab' -%}{{ team_name }}/{{ project_name }}{% endif %}"
  placeholder: "{%- if repository_provider == 'github' -%}BlueBrain/{{ project_name }}{%- elif repository_provider == 'gitlab' -%}{{ team_name }}/{{ project_name }}{% endif %}"
download_url:
  type: str
  help: The download URL
  default: "{%- if repository_provider == 'github' -%}git@github.com:{{ repository }}.git{%- elif repository_provider == 'gitlab' -%}git@bbpgitlab.epfl.ch:{{ repository }}.git{% endif %}"
  placeholder: "{%- if repository_provider == 'github' -%}git@github.com:{{ repository }}.git{%- elif repository_provider == 'gitlab' -%}git@bbpgitlab.epfl.ch:{{ repository }}.git{% endif %}"
tracker_url:
  type: str
  help: The tracker URL
  default: "{%- if repository_provider == 'github' -%}https://github.com/{{ repository }}/issues{%- elif repository_provider == 'gitlab' -%}https://bbpteam.epfl.ch/project/issues/projects/CELLS/issues{% endif %}"
  placeholder: "{%- if repository_provider == 'github' -%}https://github.com/{{ repository }}/issues{%- elif repository_provider == 'gitlab' -%}https://bbpteam.epfl.ch/project/issues/projects/CELLS/issues{% endif %}"
project_url:
  type: str
  help: The documentation URL
  default: "{%- if repository_provider == 'github' -%}https://{{ project_name }}.readthedocs.io{%- elif repository_provider == 'gitlab' -%}https://bbpteam.epfl.ch/documentation/projects/{{ project_name }}{% endif %}"
  placeholder: "{%- if repository_provider == 'github' -%}https://{{ project_name }}.readthedocs.io{%- elif repository_provider == 'gitlab' -%}https://bbpteam.epfl.ch/documentation/projects/{{ project_name }}{% endif %}"
copyright_year:
  type: str
  help: The year when the repository was created
  default: "{% now 'utc', '%Y' %}"
copyright_license:
  type: str
  help: Your project's license
  default: "{%- if repository_provider == 'gitlab' -%}BBP Internal License{% else %}Apache License 2.0{% endif %}"
  choices:
  - Apache License 2.0
  - BBP Internal License
  - BSD 3-Clause "New" or "Revised" License
  - GNU Affero General Public License v3.0
  - GNU General Public License v3.0
  - GNU Lesser General Public License v3.0
  - MIT License
  - Mozilla Public License 2.0
today:
  type: str
  help: The date used for the first version
  default: "{% now 'utc', '%d %B %Y' %}"
support_py37:
  type: bool
  help: Should the project support py37?
  choices:
    "yes": true
    "no": false
  default: "yes"
init_git:
  type: bool
  help: Should git be initialized?
  choices:
    "yes": true
    "no": false
  default: "yes"

_subdirectory:
  template
_jinja_extensions:
  - copier_templates_extensions.TemplateExtensionLoader
  - extensions/context.py:ContextUpdater
  - jinja2_time.TimeExtension
_exclude:
  - "*.py[co]"
  - ".DS_Store"
  - ".git"
  - ".svn"
  - ".tox"
  - "__pycache__"
  - "copier.yaml"
  - "copier.yml"
  - "~*"
_tasks:
    - "{%- if init_git -%}git init; git add --all; git remote add origin {{ download_url }}{% else %}{% endif %}"
